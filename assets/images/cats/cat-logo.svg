<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Cat head with stethoscope + medical cross (Logo) -->
  <defs>
    <linearGradient id="logo1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D71F84"/>
      <stop offset="100%" stop-color="#6F2282"/>
    </linearGradient>
  </defs>
  <!-- Cat head silhouette -->
  <path d="M100 180 C55 180 20 150 20 110 C20 75 45 45 60 30 L70 10 L80 25 C87 20 93 20 100 25 C107 20 113 20 120 25 L130 10 L140 30 C155 45 180 75 180 110 C180 150 145 180 100 180Z" fill="url(#logo1)"/>
  <!-- Inner ear highlights -->
  <path d="M62 32 L70 12 L78 28Z" fill="rgba(255,255,255,0.15)"/>
  <path d="M138 32 L130 12 L122 28Z" fill="rgba(255,255,255,0.15)"/>
  <!-- Eyes -->
  <ellipse cx="75" cy="95" rx="12" ry="11" fill="white"/>
  <ellipse cx="125" cy="95" rx="12" ry="11" fill="white"/>
  <ellipse cx="77" cy="95" rx="7" ry="7" fill="#333"/>
  <ellipse cx="127" cy="95" rx="7" ry="7" fill="#333"/>
  <circle cx="80" cy="92" r="3" fill="white"/>
  <circle cx="130" cy="92" r="3" fill="white"/>
  <!-- Nose -->
  <path d="M95 112 L100 118 L105 112Z" fill="white" opacity="0.8"/>
  <!-- Mouth -->
  <path d="M90 122 Q100 132 110 122" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Stethoscope -->
  <path d="M85 135 Q70 145 68 160 Q66 172 78 175" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M115 135 Q130 145 132 160 Q134 172 122 175" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Stethoscope chest piece -->
  <circle cx="100" cy="178" r="8" fill="white" opacity="0.9"/>
  <circle cx="100" cy="178" r="4" fill="rgba(215,31,132,0.3)"/>
  <!-- Medical cross on forehead -->
  <rect x="94" y="65" width="12" height="24" rx="2" fill="white" opacity="0.8"/>
  <rect x="88" y="71" width="24" height="12" rx="2" fill="white" opacity="0.8"/>
</svg>