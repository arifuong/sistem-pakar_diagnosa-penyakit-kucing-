<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none">
  <!-- Veterinarian examining a cat -->
  <!-- Vet body -->
  <rect x="100" y="50" width="60" height="90" rx="8" fill="white" stroke="#D71F84" stroke-width="2"/>
  <!-- Lab coat -->
  <path d="M100 50 L95 140 L165 140 L160 50Z" fill="white" stroke="#D71F84" stroke-width="2"/>
  <!-- Coat buttons -->
  <circle cx="130" cy="80" r="2.5" fill="#D71F84"/>
  <circle cx="130" cy="95" r="2.5" fill="#D71F84"/>
  <circle cx="130" cy="110" r="2.5" fill="#D71F84"/>
  <!-- Head -->
  <circle cx="130" cy="35" r="20" fill="#F5D0B0"/>
  <!-- Hair -->
  <path d="M110 30 Q115 10 130 12 Q145 10 150 30" fill="#333"/>
  <path d="M112 32 Q108 20 115 15" fill="#333"/>
  <path d="M148 32 Q152 20 145 15" fill="#333"/>
  <!-- Face -->
  <circle cx="123" cy="33" r="2.5" fill="#333"/>
  <circle cx="137" cy="33" r="2.5" fill="#333"/>
  <path d="M126 40 Q130 44 134 40" stroke="#D7A080" stroke-width="1.5" fill="none"/>
  <!-- Stethoscope -->
  <path d="M125 55 Q110 60 108 75 Q106 85 115 88" stroke="#555" stroke-width="2.5" fill="none"/>
  <circle cx="115" cy="90" r="5" fill="#888" stroke="#555" stroke-width="1.5"/>
  <circle cx="115" cy="90" r="2" fill="#aaa"/>
  <!-- Arm holding cat -->
  <path d="M100 70 Q80 80 75 95" stroke="#F5D0B0" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M100 70 Q80 80 75 95" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Cat being held -->
  <ellipse cx="60" cy="105" rx="22" ry="18" fill="#F0E6F6"/>
  <circle cx="52" cy="88" r="12" fill="#F0E6F6"/>
  <!-- Cat ears -->
  <path d="M44 80 L40 68 L48 78Z" fill="#F0E6F6"/>
  <path d="M58 80 L62 68 L54 78Z" fill="#F0E6F6"/>
  <path d="M45 79 L42 72 L47 78Z" fill="#F0C8E0"/>
  <path d="M57 79 L60 72 L53 78Z" fill="#F0C8E0"/>
  <!-- Cat eyes -->
  <circle cx="48" cy="86" r="3" fill="white"/>
  <circle cx="56" cy="86" r="3" fill="white"/>
  <circle cx="48.5" cy="86" r="1.8" fill="#333"/>
  <circle cx="56.5" cy="86" r="1.8" fill="#333"/>
  <circle cx="49.5" cy="85" r="0.8" fill="white"/>
  <circle cx="57.5" cy="85" r="0.8" fill="white"/>
  <!-- Cat nose -->
  <ellipse cx="52" cy="90" rx="2" ry="1.5" fill="#D7A0C0"/>
  <!-- Cat tail -->
  <path d="M80 105 Q95 95 90 80 Q88 75 85 80 Q83 90 78 100" fill="#F0E6F6"/>
  <!-- Legs -->
  <rect x="110" y="140" width="18" height="55" rx="6" fill="#333"/>
  <rect x="142" y="140" width="18" height="55" rx="6" fill="#333"/>
  <!-- Shoes -->
  <ellipse cx="119" cy="198" rx="12" ry="5" fill="#555"/>
  <ellipse cx="151" cy="198" rx="12" ry="5" fill="#555"/>
  <!-- ID badge -->
  <rect x="108" y="60" width="15" height="18" rx="2" fill="#E8F4F8" stroke="#7BBAC1" stroke-width="1"/>
  <circle cx="115" cy="66" r="3" fill="#7BBAC1"/>
  <line x1="111" y1="72" x2="119" y2="72" stroke="#7BBAC1" stroke-width="1"/>
</svg>