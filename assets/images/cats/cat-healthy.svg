<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Healthy happy cat with heart -->
  <!-- Body -->
  <ellipse cx="80" cy="128" rx="42" ry="38" fill="#F0E6F6"/>
  <ellipse cx="80" cy="128" rx="38" ry="35" fill="#E8D8F0"/>
  <!-- Head -->
  <circle cx="80" cy="72" r="30" fill="#F0E6F6"/>
  <!-- Ears -->
  <path d="M56 50 L48 22 L65 44Z" fill="#F0E6F6"/>
  <path d="M104 50 L112 22 L95 44Z" fill="#F0E6F6"/>
  <path d="M58 48 L52 30 L63 44Z" fill="#F0C8E0"/>
  <path d="M102 48 L108 30 L97 44Z" fill="#F0C8E0"/>
  <!-- Happy closed eyes -->
  <path d="M64 68 Q68 63 72 68" stroke="#333" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M88 68 Q92 63 96 68" stroke="#333" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Nose -->
  <ellipse cx="80" cy="77" rx="3" ry="2" fill="#D7A0C0"/>
  <!-- Smile -->
  <path d="M73 82 Q80 89 87 82" stroke="#C08090" stroke-width="2" fill="none"/>
  <!-- Heart -->
  <path d="M115 55 C115 50 108 45 105 52 C102 45 95 50 95 55 C95 65 105 72 105 72 C105 72 115 65 115 55Z" fill="#D71F84" opacity="0.8"/>
  <!-- Small hearts -->
  <path d="M35 40 C35 37 31 34 29 38 C27 34 23 37 23 40 C23 45 29 49 29 49 C29 49 35 45 35 40Z" fill="#F0C8E0" opacity="0.6"/>
  <path d="M130 30 C130 28 127 26 126 29 C125 26 122 28 122 30 C122 33 126 36 126 36 C126 36 130 33 130 30Z" fill="#F0C8E0" opacity="0.4"/>
  <!-- Front paws -->
  <ellipse cx="60" cy="162" rx="12" ry="8" fill="#F0E6F6"/>
  <ellipse cx="100" cy="162" rx="12" ry="8" fill="#F0E6F6"/>
  <!-- Tail (wagging up) -->
  <path d="M118 125 Q135 105 130 85 Q128 78 124 82 Q120 95 116 115" fill="#F0E6F6"/>
  <!-- Sparkles -->
  <circle cx="40" cy="60" r="2" fill="#F39C12" opacity="0.6"/>
  <circle cx="125" cy="65" r="1.5" fill="#F39C12" opacity="0.5"/>
  <circle cx="50" cy="35" r="1.5" fill="#D71F84" opacity="0.4"/>
</svg>