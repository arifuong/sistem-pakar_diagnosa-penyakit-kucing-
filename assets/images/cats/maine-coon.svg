<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Maine Coon - Large, tufted ears, bushy tail -->
  <defs><linearGradient id="mc1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7BBAC1"/><stop offset="100%" stop-color="#4A8A91"/></linearGradient></defs>
  <!-- Bushy tail -->
  <path d="M155 150 Q180 120 175 90 Q172 80 165 85 Q155 95 152 115 Q150 130 148 145" fill="#C4A882" stroke="#B09870" stroke-width="1"/>
  <path d="M158 145 Q178 118 174 95 Q170 85 165 90 Q158 100 155 118" fill="#D4B892"/>
  <!-- Body -->
  <ellipse cx="100" cy="142" rx="58" ry="48" fill="#C4A882"/>
  <ellipse cx="100" cy="142" rx="52" ry="44" fill="#D4B892"/>
  <!-- Chest fur -->
  <ellipse cx="100" cy="118" rx="30" ry="22" fill="#E8DCC8"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="33" fill="#D4B892"/>
  <!-- Tufted ears (Maine Coon characteristic) -->
  <path d="M72 52 L58 18 L82 46Z" fill="#C4A882" stroke="#B09870" stroke-width="1"/>
  <path d="M128 52 L142 18 L118 46Z" fill="#C4A882" stroke="#B09870" stroke-width="1"/>
  <!-- Ear tufts -->
  <path d="M62 35 L58 18 L68 30Z" fill="#E8DCC8"/>
  <path d="M138 35 L142 18 L132 30Z" fill="#E8DCC8"/>
  <path d="M70 48 L60 28 L78 44Z" fill="#D4B892"/>
  <path d="M130 48 L140 28 L122 44Z" fill="#D4B892"/>
  <!-- Ruff (Maine Coon characteristic) -->
  <path d="M70 75 Q60 95 65 115 Q70 100 75 90Z" fill="#E8DCC8"/>
  <path d="M130 75 Q140 95 135 115 Q130 100 125 90Z" fill="#E8DCC8"/>
  <!-- Eyes (alert, intelligent) -->
  <ellipse cx="87" cy="73" rx="7" ry="6" fill="white"/>
  <ellipse cx="113" cy="73" rx="7" ry="6" fill="white"/>
  <ellipse cx="88" cy="73" rx="4.5" ry="4" fill="#27AE60"/>
  <ellipse cx="114" cy="73" rx="4.5" ry="4" fill="#27AE60"/>
  <circle cx="89" cy="72" r="2.5" fill="#333"/>
  <circle cx="115" cy="72" r="2.5" fill="#333"/>
  <circle cx="90" cy="71" r="1.5" fill="white"/>
  <circle cx="116" cy="71" r="1.5" fill="white"/>
  <!-- Nose -->
  <path d="M97 82 L100 86 L103 82Z" fill="#B09870"/>
  <!-- Mouth -->
  <path d="M95 88 Q100 93 105 88" stroke="#A08860" stroke-width="1.5" fill="none"/>
  <!-- Whiskers (longer than average) -->
  <line x1="60" y1="80" x2="80" y2="84" stroke="#C0B0A0" stroke-width="1"/>
  <line x1="58" y1="86" x2="79" y2="87" stroke="#C0B0A0" stroke-width="1"/>
  <line x1="56" y1="92" x2="78" y2="90" stroke="#C0B0A0" stroke-width="1"/>
  <line x1="120" y1="84" x2="140" y2="80" stroke="#C0B0A0" stroke-width="1"/>
  <line x1="121" y1="87" x2="142" y2="86" stroke="#C0B0A0" stroke-width="1"/>
  <line x1="122" y1="90" x2="144" y2="92" stroke="#C0B0A0" stroke-width="1"/>
  <!-- Front paws (large, tufted) -->
  <ellipse cx="78" cy="180" rx="14" ry="9" fill="#D4B892"/>
  <ellipse cx="122" cy="180" rx="14" ry="9" fill="#D4B892"/>
  <!-- Toe tufts -->
  <circle cx="73" cy="179" r="3.5" fill="#E8DCC8"/>
  <circle cx="78" cy="176" r="3.5" fill="#E8DCC8"/>
  <circle cx="83" cy="179" r="3.5" fill="#E8DCC8"/>
  <circle cx="117" cy="179" r="3.5" fill="#E8DCC8"/>
  <circle cx="122" cy="176" r="3.5" fill="#E8DCC8"/>
  <circle cx="127" cy="179" r="3.5" fill="#E8DCC8"/>
  <!-- Tabby stripes -->
  <path d="M80 125 Q100 120 120 125" stroke="#B09870" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M82 135 Q100 130 118 135" stroke="#B09870" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>