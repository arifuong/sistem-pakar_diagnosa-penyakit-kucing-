<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F8EE"/>
      <stop offset="100%" stop-color="#D4F0E0"/>
    </linearGradient>
    <linearGradient id="hcat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF5F0"/>
      <stop offset="100%" stop-color="#F0E6DE"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#hbg)" rx="20"/>
  <!-- Subtle sparkles -->
  <circle cx="60" cy="60" r="4" fill="#27AE60" opacity="0.15"/>
  <circle cx="240" cy="80" r="3" fill="#27AE60" opacity="0.1"/>
  <circle cx="200" cy="40" r="2.5" fill="#F39C12" opacity="0.12"/>
  <circle cx="80" cy="220" r="3" fill="#27AE60" opacity="0.1"/>
  <!-- Heart shapes -->
  <g opacity="0.1">
    <path d="M50 80 C50 76 46 73 44 77 C42 73 38 76 38 80 C38 86 44 90 44 90 C44 90 50 86 50 80Z" fill="#27AE60"/>
    <path d="M255 100 C255 97 252 95 251 98 C250 95 247 97 247 100 C247 104 251 106 251 106 C251 106 255 104 255 100Z" fill="#27AE60"/>
  </g>
  <!-- === HEALTHY CAT (sitting, happy, with heart) === -->
  <g transform="translate(75, 50)">
    <!-- Shadow -->
    <ellipse cx="75" cy="195" rx="55" ry="8" fill="#27AE60" opacity="0.08"/>
    <!-- Tail (wagging up - happy) -->
    <path d="M125 140 Q148 115 145 85 Q143 72 138 78 Q130 95 122 128" fill="#F0E6DE"/>
    <path d="M127 135 Q145 112 142 88 Q140 78 136 82 Q130 98 124 125" fill="url(#hcat)"/>
    <!-- Body -->
    <ellipse cx="75" cy="145" rx="55" ry="48" fill="url(#hcat)"/>
    <!-- Chest highlight -->
    <ellipse cx="75" cy="130" rx="30" ry="25" fill="#FAF5F0" opacity="0.5"/>
    <!-- Head -->
    <circle cx="75" cy="72" r="38" fill="url(#hcat)"/>
    <!-- Ears -->
    <path d="M44 48 L34 14 L56 42Z" fill="url(#hcat)"/>
    <path d="M106 48 L116 14 L94 42Z" fill="url(#hcat)"/>
    <path d="M46 46 L38 22 L54 42Z" fill="#F0C0B0"/>
    <path d="M104 46 L112 22 L96 42Z" fill="#F0C0B0"/>
    <!-- Happy closed eyes -->
    <path d="M56 68 Q62 62 68 68" stroke="#333" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M82 68 Q88 62 94 68" stroke="#333" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Nose -->
    <ellipse cx="75" cy="78" rx="3.5" ry="2.5" fill="#D4856A"/>
    <!-- Happy mouth -->
    <path d="M66 84 Q75 92 84 84" stroke="#C07A5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <circle cx="52" cy="78" r="6" fill="#F0C0B0" opacity="0.3"/>
    <circle cx="98" cy="78" r="6" fill="#F0C0B0" opacity="0.3"/>
    <!-- Whiskers -->
    <line x1="28" y1="74" x2="48" y2="76" stroke="#D4C4B8" stroke-width="1.5"/>
    <line x1="26" y1="82" x2="47" y2="82" stroke="#D4C4B8" stroke-width="1.5"/>
    <line x1="28" y1="90" x2="48" y2="88" stroke="#D4C4B8" stroke-width="1.5"/>
    <line x1="102" y1="76" x2="122" y2="74" stroke="#D4C4B8" stroke-width="1.5"/>
    <line x1="103" y1="82" x2="124" y2="82" stroke="#D4C4B8" stroke-width="1.5"/>
    <line x1="102" y1="88" x2="122" y2="90" stroke="#D4C4B8" stroke-width="1.5"/>
    <!-- Front paws -->
    <ellipse cx="50" cy="188" rx="16" ry="10" fill="url(#hcat)"/>
    <ellipse cx="100" cy="188" rx="16" ry="10" fill="url(#hcat)"/>
    <!-- Paw pads -->
    <ellipse cx="50" cy="186" rx="5" ry="3.5" fill="#F0C0B0" opacity="0.4"/>
    <ellipse cx="100" cy="186" rx="5" ry="3.5" fill="#F0C0B0" opacity="0.4"/>
    <!-- Floating heart above -->
    <g transform="translate(100, 20)">
      <path d="M12 5 C12 1 7 -3 4 3 C1 -3 -4 1 -4 5 C-4 12 4 18 4 18 C4 18 12 12 12 5Z" fill="#D71F84" opacity="0.6">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Sparkle near head -->
    <g transform="translate(110, 40)" opacity="0.5">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#F39C12" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#F39C12" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Health checkmark -->
  <g transform="translate(130, 248)">
    <circle cx="20" cy="20" r="18" fill="#27AE60" opacity="0.9"/>
    <path d="M12 20 L18 26 L30 14" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="150" y="290" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" fill="#27AE60" font-weight="600">Kucing Sehat &amp; Bahagia</text>
</svg>