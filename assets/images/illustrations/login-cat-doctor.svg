      <ellipse cx="70" cy="58" rx="4" ry="3" fill="#D4856A"/>
      <!-- Mouth -->
      <path d="M64 63 Q70 68 76 63" stroke="#C07A5A" stroke-width="1.5" fill="none"/>
      <!-- Whiskers -->
      <line x1="30" y1="55" x2="50" y2="58" stroke="#D4C4B8" stroke-width="1.2"/>
      <line x1="28" y1="62" x2="49" y2="62" stroke="#D4C4B8" stroke-width="1.2"/>
      <line x1="30" y1="69" x2="50" y2="66" stroke="#D4C4B8" stroke-width="1.2"/>
      <line x1="90" y1="58" x2="110" y2="55" stroke="#D4C4B8" stroke-width="1.2"/>
      <line x1="91" y1="62" x2="112" y2="62" stroke="#D4C4B8" stroke-width="1.2"/>
      <line x1="90" y1="66" x2="110" y2="69" stroke="#D4C4B8" stroke-width="1.2"/>
      <!-- Front paws on table -->
      <ellipse cx="40" cy="140" rx="15" ry="10" fill="#F0E6DE"/>
      <ellipse cx="100" cy="140" rx="15" ry="10" fill="#F0E6DE"/>
      <!-- Tail -->
      <path d="M120 95 Q140 75 135 55 Q133 48 128 52 Q122 65 118 88" fill="url(#persian)"/>
    </g>
    <!-- === MAINE COON (sitting on floor) === -->
    <g transform="translate(350, 200)">
      <!-- Body -->
