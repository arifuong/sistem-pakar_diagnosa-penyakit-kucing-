      <path d="M35 85 Q70 78 105 85" stroke="#B09070" stroke-width="2" fill="none" opacity="0.3"/>
      <path d="M38 95 Q70 88 102 95" stroke="#B09070" stroke-width="2" fill="none" opacity="0.3"/>
      <!-- Head -->
