    <ellipse cx="314" cy="125" rx="5.5" ry="6" fill="white"/>
    <circle cx="287" cy="125" r="3.5" fill="#4A3728"/>
    <circle cx="315" cy="125" r="3.5" fill="#4A3728"/>
    <circle cx="288.5" cy="123.5" r="1.5" fill="white"/>
    <circle cx="316.5" cy="123.5" r="1.5" fill="white"/>
