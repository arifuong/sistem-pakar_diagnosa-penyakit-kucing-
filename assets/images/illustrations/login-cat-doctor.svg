    <path d="M278 116 Q284 113 292 115" stroke="#3D2B1F" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M308 115 Q316 113 322 116" stroke="#3D2B1F" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M296 134 L300 138 L304 134Z" fill="#D4856A"/>
    <!-- Smile -->
    <path d="M292 142 Q300 149 308 142" stroke="#C07A5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
