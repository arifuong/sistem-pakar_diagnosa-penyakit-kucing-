      <!-- Tufted ears (Maine Coon characteristic) -->
      <path d="M44 22 L32 -5 L52 18Z" fill="#C4A882"/>
      <path d="M96 22 L108 -5 L88 18Z" fill="#C4A882"/>
      <!-- Ear tufts -->
      <path d="M36 10 L30 0 L40 8Z" fill="#D4B896" stroke="#B09070" stroke-width="0.5"/>
      <path d="M104 10 L110 0 L100 8Z" fill="#D4B896" stroke="#B09070" stroke-width="0.5"/>
      <path d="M46 20 L42 6 L50 18Z" fill="#E0C8A8"/>
      <path d="M94 20 L98 6 L90 18Z" fill="#E0C8A8"/>
      <!-- Ruff (lion-like mane) -->
      <path d="M42 35 Q32 50 36 68 Q40 55 44 45Z" fill="#E0C8A8"/>
      <path d="M98 35 Q108 50 104 68 Q100 55 96 45Z" fill="#E0C8A8"/>
      <!-- Face -->
      <circle cx="58" cy="38" r="5" fill="white"/>
      <circle cx="82" cy="38" r="5" fill="white"/>
      <circle cx="59" cy="38" r="3" fill="#27AE60"/>
      <circle cx="83" cy="38" r="3" fill="#27AE60"/>
      <circle cx="60" cy="37" r="1.2" fill="white"/>
      <circle cx="84" cy="37" r="1.2" fill="white"/>
      <!-- Nose -->
      <path d="M67 44 L70 47 L73 44Z" fill="#8B6F47"/>
      <!-- Mouth -->
      <path d="M64 49 Q70 54 76 49" stroke="#7A5F37" stroke-width="1.5" fill="none"/>
      <!-- Whiskers -->
      <line x1="30" y1="42" x2="52" y2="44" stroke="#C4A882" stroke-width="1.2"/>
      <line x1="28" y1="48" x2="51" y2="48" stroke="#C4A882" stroke-width="1.2"/>
      <line x1="88" y1="44" x2="110" y2="42" stroke="#C4A882" stroke-width="1.2"/>
      <line x1="89" y1="48" x2="112" y2="48" stroke="#C4A882" stroke-width="1.2"/>
      <!-- Bushy tail -->
      <path d="M115 80 Q140 60 138 35 Q136 25 130 30 Q125 45 118 70" fill="#C4A882" stroke="#B09070" stroke-width="0.5"/>
      <path d="M118 75 Q138 58 135 38 Q133 30 129 34 Q125 48 116 68" fill="#D4B896"/>
      <!-- Front paws -->
      <ellipse cx="50" cy="128" rx="14" ry="10" fill="#D4B896"/>
      <ellipse cx="90" cy="128" rx="14" ry="10" fill="#D4B896"/>
    </g>
    <!-- Vet's left arm reaching toward Persian cat -->
    <path d="M260 190 Q230 210 215 230" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Hand on cat -->
    <circle cx="212" cy="232" r="8" fill="#E8B89A"/>
    <!-- Vet's right arm -->
    <path d="M340 190 Q360 200 365 215" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="367" cy="218" r="8" fill="#E8B89A"/>
    <!-- Label -->
    <text x="300" y="380" text-anchor="middle" font-family="'Noto Serif',serif" font-size="18" font-weight="700" fill="#333">Dokter Hewan Memeriksa Kucing</text>
    <text x="300" y="396" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" fill="#888">DiagnosaKu — Sistem Pakar Diagnosa Penyakit Kucing</text>
  </g>
</svg>