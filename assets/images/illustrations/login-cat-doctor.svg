<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F4F0"/>
      <stop offset="100%" stop-color="#EDE4DA"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>
    <linearGradient id="persian" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EDE8"/>
      <stop offset="100%" stop-color="#E8DCD4"/>
    </linearGradient>
    <linearGradient id="coone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B896"/>
      <stop offset="100%" stop-color="#C4A882"/>
    </linearGradient>
    <clipPath id="clip1"><rect width="600" height="400" rx="20"/></clipPath>
  </defs>
  <g clip-path="url(#clip1)">
    <!-- Background -->
    <rect width="600" height="400" fill="url(#bg1)"/>
    <!-- Subtle paw pattern -->
    <g opacity="0.03">
      <path d="M50 50c3 0 5 4 5 9s-2 9-5 9-5-4-5-9 2-9 5-9zm-10 15c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7zm20 0c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7z" fill="#D71F84"/>
      <path d="M150 100c3 0 5 4 5 9s-2 9-5 9-5-4-5-9 2-9 5-9zm-10 15c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7zm20 0c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7z" fill="#D71F84"/>
      <path d="M450 60c3 0 5 4 5 9s-2 9-5 9-5-4-5-9 2-9 5-9zm-10 15c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7zm20 0c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7z" fill="#D71F84"/>
      <path d="M520 180c3 0 5 4 5 9s-2 9-5 9-5-4-5-9 2-9 5-9zm-10 15c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7zm20 0c-2 0-3.5-3-3.5-7s1.5-7 3.5-7 3.5 3 3.5 7-1.5 7-3.5 7z" fill="#D71F84"/>
    </g>
    <!-- Exam table -->
    <rect x="80" y="300" width="440" height="12" rx="6" fill="#B8C4CC"/>
    <rect x="100" y="312" width="8" height="60" rx="3" fill="#9AA8B2"/>
    <rect x="492" y="312" width="8" height="60" rx="3" fill="#9AA8B2"/>
    <!-- Stethoscope on table -->
    <path d="M420 298 Q415 285 420 275 Q425 265 435 270" stroke="#555" stroke-width="3" fill="none"/>
    <circle cx="435" cy="273" r="8" fill="#777" stroke="#555" stroke-width="2"/>
    <circle cx="435" cy="273" r="4" fill="#999"/>
    <!-- Medicine bottles -->
    <rect x="380" y="280" width="18" height="24" rx="4" fill="#D71F84" opacity="0.85"/>
    <rect x="378" y="276" width="22" height="6" rx="2" fill="#C01A76"/>
    <circle cx="389" cy="270" r="3" fill="#D71F84" opacity="0.5"/>
    <rect x="445" y="283" width="15" height="21" rx="3" fill="#27AE60" opacity="0.85"/>
    <rect x="443" y="279" width="19" height="6" rx="2" fill="#1E8449"/>
    <rect x="468" y="281" width="16" height="23" rx="3" fill="#7BBAC1" opacity="0.85"/>
    <rect x="466" y="277" width="20" height="6" rx="2" fill="#5A9EA3"/>
    <!-- Clipboard on wall -->
    <rect x="480" y="60" width="70" height="90" rx="6" fill="#F5F0E8" stroke="#C8B8A0" stroke-width="2"/>
    <rect x="500" y="55" width="30" height="10" rx="4" fill="#C8B8A0"/>
    <line x1="492" y1="85" x2="538" y2="85" stroke="#D71F84" stroke-width="2.5"/>
    <line x1="492" y1="95" x2="530" y2="95" stroke="#DDD" stroke-width="2"/>
    <line x1="492" y1="105" x2="535" y2="105" stroke="#DDD" stroke-width="2"/>
    <line x1="492" y1="115" x2="525" y2="115" stroke="#DDD" stroke-width="2"/>
    <line x1="492" y1="125" x2="528" y2="125" stroke="#DDD" stroke-width="2"/>
    <circle cx="489" cy="85" r="3.5" fill="#27AE60"/>
    <circle cx="489" cy="95" r="3.5" fill="#F39C12"/>
    <circle cx="489" cy="105" r="3.5" fill="#27AE60"/>
    <circle cx="489" cy="115" r="3.5" fill="#27AE60"/>
    <!-- Heart rate monitor -->
    <rect x="60" y="50" width="120" height="80" rx="10" fill="#2D3748"/>
    <rect x="68" y="58" width="104" height="55" rx="6" fill="#1A202C"/>
    <polyline points="68,85 82,85 88,70 94,95 100,75 106,85 120,85 126,70 132,90 138,80 144,85 172,85" stroke="#48BB78" stroke-width="2" fill="none"/>
    <circle cx="110" cy="108" r="4" fill="#48BB78"/>
    <text x="70" y="135" font-family="Poppins,sans-serif" font-size="10" fill="#48BB78" opacity="0.7">HEART RATE</text>
    <!-- === VETERINARIAN === -->
    <!-- Body / Lab coat -->
    <path d="M260 160 L248 300 L352 300 L340 160Z" fill="url(#coat)" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Lab coat collar -->
    <path d="M275 160 L282 185 L318 185 L325 160" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Coat pockets -->
    <rect x="262" y="220" width="30" height="3" rx="1.5" fill="#E2E8F0"/>
    <rect x="348" y="220" width="30" height="3" rx="1.5" fill="#E2E8F0"/>
    <!-- Buttons -->
    <circle cx="300" cy="198" r="3" fill="#D71F84"/>
    <circle cx="300" cy="215" r="3" fill="#D71F84"/>
    <circle cx="300" cy="232" r="3" fill="#D71F84"/>
    <!-- ID Badge -->
    <rect x="328" y="175" width="22" height="28" rx="3" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="333" y="180" width="12" height="10" rx="2" fill="#E2E8F0"/>
    <line x1="333" y1="195" x2="345" y2="195" stroke="#CBD5E0" stroke-width="1"/>
    <line x1="335" y1="198" x2="343" y2="198" stroke="#CBD5E0" stroke-width="1"/>
