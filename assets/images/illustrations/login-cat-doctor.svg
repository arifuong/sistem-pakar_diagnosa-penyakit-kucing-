      <!-- Flat face (Persian characteristic) -->
      <circle cx="70" cy="58" r="22" fill="#F5EDE8"/>
      <!-- Ears (small, rounded) -->
      <path d="M42 32 L36 10 L52 28Z" fill="#F0E6DE"/>
      <path d="M98 32 L104 10 L88 28Z" fill="#F0E6DE"/>
      <path d="M44 30 L40 16 L50 28Z" fill="#F0C0B0"/>
      <path d="M96 30 L100 16 L90 28Z" fill="#F0C0B0"/>
      <!-- Big round eyes -->
      <circle cx="58" cy="50" r="8" fill="white"/>
      <circle cx="82" cy="50" r="8" fill="white"/>
      <circle cx="59" cy="50" r="5" fill="#D4956A"/>
      <circle cx="83" cy="50" r="5" fill="#D4956A"/>
      <circle cx="60.5" cy="48.5" r="2" fill="white"/>
      <circle cx="84.5" cy="48.5" r="2" fill="white"/>
